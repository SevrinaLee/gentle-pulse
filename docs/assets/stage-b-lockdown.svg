<svg viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Stage B — Lock it down (Sprint 4)</title>
<desc>Magic-link login and owner-scoped row level security are added. Anonymous visitors keep read-only access to the demo dataset; logged-in users get their own private, isolated version of the core loop, verified by 15 automated security tests.</desc>
<defs>
  <marker id="b1" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#9a8fc4"/>
  </marker>
</defs>
<rect width="1000" height="320" fill="#ffffff"/>
<text x="40" y="34" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#2e2360">Stage B — Lock it down (Sprint 4)</text>
<text x="40" y="54" font-family="system-ui,sans-serif" font-size="12.5" fill="#6b6280">Auth + owner-scoped RLS added on top of the Stage A loop. Demo stays public and read-only.</text>

<g font-family="system-ui,sans-serif">
  <rect x="40" y="76" width="280" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="54" y="102" font-size="13.5" font-weight="600" fill="#2e2360">Anonymous visitor</text>
  <text x="54" y="120" font-size="11.5" fill="#6b6280">sees demo, read-only</text>

  <rect x="40" y="184" width="280" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="54" y="210" font-size="13.5" font-weight="600" fill="#2e2360">Magic-link login</text>
  <text x="54" y="228" font-size="11.5" fill="#6b6280">no password, Supabase Auth</text>

  <line x1="180" y1="136" x2="180" y2="184" stroke="#9a8fc4" stroke-width="1.5" marker-end="url(#b1)"/>
  <text x="192" y="164" font-size="10.5" font-style="italic" fill="#6b6280">clicks "Log in"</text>

  <line x1="320" y1="214" x2="360" y2="214" stroke="#9a8fc4" stroke-width="1.5" marker-end="url(#b1)"/>

  <rect x="360" y="184" width="300" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="374" y="210" font-size="13.5" font-weight="600" fill="#2e2360">Own private check-in loop</text>
  <text x="374" y="228" font-size="11.5" fill="#6b6280">same engine as Stage A, scoped to auth.uid()</text>

  <line x1="660" y1="214" x2="700" y2="214" stroke="#9a8fc4" stroke-width="1.5" marker-end="url(#b1)"/>

  <rect x="700" y="184" width="260" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="714" y="210" font-size="13.5" font-weight="600" fill="#2e2360">Verified: owner-scoped RLS</text>
  <text x="714" y="228" font-size="11.5" fill="#6b6280">rate-limited logins, private audit log</text>
</g>

<rect x="700" y="76" width="260" height="60" rx="10" fill="#2e2360"/>
<text x="714" y="102" font-family="system-ui,sans-serif" font-size="13.5" font-weight="700" fill="#faf7f2">15/15 security tests</text>
<text x="714" y="120" font-family="system-ui,sans-serif" font-size="11.5" fill="#cfc8e8">isolation · injection · brute-force · exfil</text>
</svg>
