<svg viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Stage C — Navigation, mobile, and account management</title>
<desc>A left sidebar on desktop and a hamburger-triggered drawer on mobile replace the old top nav bar. A new account page adds name and email management, a billing placeholder, and delete account. A production-breaking loading-state bug was found and fixed during this stage.</desc>
<defs>
  <marker id="c1" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#9a8fc4"/>
  </marker>
</defs>
<rect width="1000" height="320" fill="#ffffff"/>
<text x="40" y="34" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#2e2360">Stage C — Navigation, mobile &amp; account</text>
<text x="40" y="54" font-family="system-ui,sans-serif" font-size="12.5" fill="#6b6280">Sidebar/hamburger nav wraps the whole app; account page adds self-service profile controls.</text>

<g font-family="system-ui,sans-serif">
  <rect x="40" y="76" width="280" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="54" y="102" font-size="13.5" font-weight="600" fill="#2e2360">Sidebar (desktop) /</text>
  <text x="54" y="120" font-size="13.5" font-weight="600" fill="#2e2360">hamburger drawer (mobile)</text>

  <rect x="360" y="76" width="280" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="374" y="102" font-size="13.5" font-weight="600" fill="#2e2360">Mobile-optimized</text>
  <text x="374" y="120" font-size="11.5" fill="#6b6280">no horizontal overflow, 44px+ targets</text>

  <rect x="680" y="76" width="280" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="694" y="102" font-size="13.5" font-weight="600" fill="#2e2360">Account page</text>
  <text x="694" y="120" font-size="11.5" fill="#6b6280">name, email change, billing (placeholder)</text>

  <line x1="320" y1="106" x2="360" y2="106" stroke="#9a8fc4" stroke-width="1.5" marker-end="url(#c1)"/>
  <line x1="640" y1="106" x2="680" y2="106" stroke="#9a8fc4" stroke-width="1.5" marker-end="url(#c1)"/>

  <line x1="820" y1="136" x2="820" y2="160" stroke="#9a8fc4" stroke-width="1.5"/>
  <line x1="820" y1="160" x2="500" y2="160" stroke="#9a8fc4" stroke-width="1.5"/>
  <line x1="500" y1="160" x2="500" y2="184" stroke="#9a8fc4" stroke-width="1.5" marker-end="url(#c1)"/>

  <rect x="360" y="184" width="280" height="60" rx="10" fill="#f3f0fa" stroke="#d8d0ea"/>
  <text x="374" y="210" font-size="13.5" font-weight="600" fill="#2e2360">Delete account</text>
  <text x="374" y="228" font-size="11.5" fill="#6b6280">type-DELETE confirm, full data purge</text>
</g>

<rect x="680" y="184" width="280" height="60" rx="10" fill="#b7791b"/>
<text x="694" y="210" font-family="system-ui,sans-serif" font-size="13.5" font-weight="700" fill="#ffffff">Bug found &amp; fixed</text>
<text x="694" y="228" font-family="system-ui,sans-serif" font-size="11" fill="#fff3e0">loading.tsx hung forever in prod — removed</text>
</svg>
