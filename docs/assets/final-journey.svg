<svg viewBox="0 0 1000 1130" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Gentle Pulse — current user journey and build status</title>
<desc>Flowchart of the Gentle Pulse user journey as of the email+password auth milestone: anonymous demo, email/password sign up or log in with instant sessions and an emailed password-reset link, the core check-in-to-suggestion loop, secondary actions, navigation and account management, a cross-cutting security status grid, and a backlog of three remaining items (voice input, email digest, real GPT-4o suggestion generation).</desc>

