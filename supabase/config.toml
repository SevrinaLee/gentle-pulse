project_id = "ywqrkukyqwspfqyqbtik"

# NOTE: `supabase config push` in this CLI version is a FULL-config sync, not a
# targeted patch — it applies CLI defaults for any field omitted here. So this
# file explicitly restates the project's original auth values and only ADDS the
# redirect allowlist. Do not run `config push` with a partial [auth] block.

[auth]
# Redirect allowlist so magic-link confirmations land back on the app.
site_url = "https://gentle-pulse.vercel.app"
additional_redirect_urls = [
  "https://gentle-pulse.vercel.app/**",
  "http://localhost:3000/**",
]
jwt_expiry = 3600
enable_signup = true

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600
